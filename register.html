<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — NagarSeva</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">Nagar<span>Seva</span></a>
  <div class="nav-actions">
    <span style="font-size:14px; color:var(--text-muted);">Already have an account?</span>
    <a href="login.html" class="btn btn-outline">Log In</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box fade-up" style="max-width:500px;">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size:36px; margin-bottom:8px;">🗺️</div>
      <h2>Join NagarSeva</h2>
      <p class="auth-sub">Create your free account and start making your city better</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" placeholder="Rohit"/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" placeholder="Sharma"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="rohit@example.com"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <select>
          <option>Delhi</option>
          <option>Mumbai</option>
          <option>Bangalore</option>
          <option>Chennai</option>
          <option>Hyderabad</option>
          <option>Pune</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Area / Locality</label>
        <input type="text" placeholder="e.g. Laxmi Nagar"/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Create a strong password"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" placeholder="Repeat your password"/>
    </div>

    <div style="background:var(--orange-light); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; color:#9A3412; margin-bottom:18px;">
      ✅ By signing up you agree to report genuine issues only. False reports will reduce your trust score.
    </div>

    <a href="dashboard.html" class="btn btn-primary" style="width:100%; justify-content:center; font-size:15px; padding:13px;">Create My Account →</a>
    <p class="auth-foot">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>
</body>
</html>
