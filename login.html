<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — NagarSeva</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">Nagar<span>Seva</span></a>
  <div class="nav-actions">
    <span style="font-size:14px; color:var(--text-muted);">Don't have an account?</span>
    <a href="register.html" class="btn btn-primary">Sign Up Free</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box fade-up">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size:36px; margin-bottom:8px;">👋</div>
      <h2>Welcome back</h2>
      <p class="auth-sub">Log in to your NagarSeva account</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password"/>
    </div>
    <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
      <a href="#" style="font-size:13px; color:var(--orange);">Forgot password?</a>
    </div>

    <a href="dashboard.html" class="btn btn-primary" style="width:100%; justify-content:center; font-size:15px; padding:13px;">Log In →</a>

    <div class="divider"><span>or</span></div>
    <button class="btn btn-outline" style="width:100%; justify-content:center;">
      <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="G"/> Continue with Google
    </button>

    <p class="auth-foot">Don't have an account? <a href="register.html">Sign up free</a></p>
  </div>
</div>
</body>
</html>
